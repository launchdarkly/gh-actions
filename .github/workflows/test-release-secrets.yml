name: Test release-secrets

# Runs the ssm-get-parameters.sh smoke test. The script handles decrypted
# secrets, so regressions in masking or value handling are security-relevant;
# this gate keeps it covered.

on:
  pull_request:
    paths:
      - 'actions/release-secrets/**'
      - '.github/workflows/test-release-secrets.yml'
  push:
    branches:
      - main
    paths:
      - 'actions/release-secrets/**'
      - '.github/workflows/test-release-secrets.yml'

permissions:
  contents: read

jobs:
  ssm-get-parameters:
    name: ssm-get-parameters.sh smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run smoke test
        shell: bash
        run: bash actions/release-secrets/tests/ssm-get-parameters.test.sh
